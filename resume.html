<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume | Your Name</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --text: #1a1a18;
      --muted: #6b6b67;
      --border: #e4e2db;
      --accent: #2a6049;
      --nav-bg: rgba(249,248,246,0.9);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1c1c1a;
        --text: #e8e6e0;
        --muted: #888884;
        --border: #2e2e2b;
        --accent: #4caf87;
        --nav-bg: rgba(17,17,16,0.9);
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: sticky; top: 0;
      background: var(--nav-bg);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
      flex-shrink: 0;
    }

    .nav-left { display: flex; align-items: center; gap: 1.5rem; }

    .nav-back {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }

    .nav-title {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
    }

    .nav-divider {
      width: 1px; height: 18px;
      background: var(--border);
    }

    .btn-download {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: var(--accent);
      color: var(--bg);
      padding: 7px 16px;
      border-radius: 4px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-download:hover { opacity: 0.85; }

    .btn-download svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .viewer-wrap {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pdf-frame {
      width: 100%;
      max-width: 860px;
      flex: 1;
      min-height: calc(100vh - 56px - 4rem);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }

    .pdf-frame iframe {
      width: 100%; height: 100%;
      min-height: calc(100vh - 56px - 4rem);
      border: none;
      display: block;
    }

    /* Fallback message shown if iframe can't render PDF */
    .pdf-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 4rem 2rem;
      text-align: center;
    }
    .pdf-fallback p { color: var(--muted); font-size: 15px; font-weight: 300; }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .nav-title { display: none; }
      .nav-divider { display: none; }
      .viewer-wrap { padding: 1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <a href="./index.html" class="nav-back">← Back</a>
      <div class="nav-divider"></div>
      <span class="nav-title">resume.pdf</span>
    </div>
    <a href="./resume.pdf" download="YourName_Resume.pdf" class="btn-download">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </a>
  </nav>

  <div class="viewer-wrap">
    <div class="pdf-frame" id="pdfFrame">
      <iframe
        src="./resume.pdf"
        title="Resume"
        id="pdfIframe"
      ></iframe>
      <div class="pdf-fallback" id="pdfFallback">
        <p>Your browser can't preview PDFs inline.</p>
        <a href="./resume.pdf" download="YourName_Resume.pdf" class="btn-download">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Resume
        </a>
      </div>
    </div>
  </div>

  <script>
    // If the iframe fails to load the PDF, show the fallback
    const iframe = document.getElementById('pdfIframe');
    const fallback = document.getElementById('pdfFallback');
    iframe.addEventListener('error', () => {
      iframe.style.display = 'none';
      fallback.style.display = 'flex';
    });
  </script>

</body>
</html>
